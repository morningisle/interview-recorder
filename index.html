<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="面试记录与复盘 - 8-BIT 像素艺术风格版">
    <title>面试记录与复盘 [PIXEL EDITION]</title>
    <link rel="stylesheet" href="css/pixel.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
</head>
<body>
    <!-- 8-bit 加载进度条 -->
    <div id="loading-screen" class="modal-pixel" style="background: #000; flex-direction: column; gap: 24px;">
        <div style="color: var(--pixel-teal); font-size: 32px; font-weight: bold;">LOADING...</div>
        <div class="pixel-loader">
            <div id="loading-bar" class="pixel-loader__bar"></div>
        </div>
        <div id="loading-text" style="color: var(--pixel-white); font-size: 16px; letter-spacing: 4px;">▓▓▓▓░░░░░░░░ 25%</div>
    </div>

    <header class="header-pixel">
        <div style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
            <h1 style="margin: 0; font-size: 24px;">🎮 面试复盘 PIXEL</h1>
            <nav class="header__nav">
                <button class="header__nav-btn is-active" data-tab="interview">面试记录</button>
                <button class="header__nav-btn" data-tab="question">题库管理</button>
                <button class="header__nav-btn" data-tab="analysis">复盘分析</button>
            </nav>
            <div style="display: flex; gap: 8px;">
                <button class="btn-pixel btn-pixel--secondary" id="btn-import">导入</button>
                <button class="btn-pixel btn-pixel--secondary" id="btn-export-json">备份</button>
                <button class="btn-pixel btn-pixel--secondary" id="btn-export">导出</button>
            </div>
        </div>
    </header>

    <main style="max-width: 1200px; margin: 40px auto; padding: 0 20px;">
        <!-- 面试记录面板 -->
        <section class="tab-panel is-active" id="panel-interview">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <h2 style="margin: 0;"># 面试记录</h2>
                <button class="btn-pixel btn-pixel--primary" id="btn-add-interview">+ 新增记录</button>
            </div>
            
            <div class="pixel-border" style="margin-bottom: 32px; background: #eee;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px;">
                    <div>
                        <label style="font-size: 14px; display: block; margin-bottom: 8px;">公司筛选</label>
                        <input type="text" id="filter-company" class="input-pixel" placeholder="SEARCH...">
                    </div>
                    <div>
                        <label style="font-size: 14px; display: block; margin-bottom: 8px;">职位筛选</label>
                        <input type="text" id="filter-position" class="input-pixel" placeholder="SEARCH...">
                    </div>
                    <div>
                        <label style="font-size: 14px; display: block; margin-bottom: 8px;">状态</label>
                        <select id="filter-status" class="input-pixel" style="background: #000;">
                            <option value="">全部</option>
                            <option value="pending">待反馈</option>
                            <option value="passed">通过</option>
                            <option value="failed">未通过</option>
                        </select>
                    </div>
                </div>
            </div>

            <div id="interview-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px;">
                <!-- 面试卡片 -->
            </div>
        </section>

        <!-- 题库管理面板 -->
        <section class="tab-panel" id="panel-question">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px;">
                <h2 style="margin: 0;"># 题库管理</h2>
                <div style="display: flex; gap: 16px; align-items: center;">
                    <div id="batch-actions-area" hidden style="display: flex; gap: 8px; align-items: center;">
                        <span id="selected-count" style="font-size: 14px;">已选 0</span>
                        <select id="select-batch-category" class="input-pixel" style="width: auto; padding: 4px; font-size: 14px;">
                            <option value="">批量修改...</option>
                        </select>
                        <button class="btn-pixel btn-pixel--danger" id="btn-batch-delete" style="padding: 4px 8px; font-size: 14px;">删除</button>
                    </div>
                    <button class="btn-pixel btn-pixel--secondary" id="btn-manage-categories">管理类别</button>
                    <button class="btn-pixel btn-pixel--primary" id="btn-add-question">+ 添加题目</button>
                </div>
            </div>

            <div class="pixel-border" style="margin-bottom: 32px; background: #eee;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px;">
                    <input type="text" id="filter-q-company" class="input-pixel" placeholder="公司...">
                    <input type="text" id="filter-q-position" class="input-pixel" placeholder="职位...">
                    <select id="filter-category" class="input-pixel">
                        <option value="">全部类别</option>
                    </select>
                    <select id="filter-difficulty" class="input-pixel">
                        <option value="">全部难度</option>
                        <option value="easy">简单</option>
                        <option value="medium">中等</option>
                        <option value="hard">困难</option>
                    </select>
                    <input type="text" id="filter-question" class="input-pixel" placeholder="搜索内容...">
                </div>
            </div>

            <div style="margin-bottom: 16px; display: flex; align-items: center; gap: 8px;">
                <input type="checkbox" id="check-all-questions" style="width: 24px; height: 24px; image-rendering: pixelated;">
                <label for="check-all-questions" style="font-size: 16px;">全选</label>
            </div>

            <div id="question-list"></div>
        </section>

        <!-- 复盘分析面板 -->
        <section class="tab-panel" id="panel-analysis">
            <h2 style="margin-bottom: 32px;"># 复盘分析</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 24px; margin-bottom: 40px;">
                <div class="pixel-border" style="text-align: center;">
                    <div style="font-size: 14px; margin-bottom: 16px;">总面试</div>
                    <div id="stat-total" style="font-size: 32px; color: var(--pixel-teal);">0</div>
                </div>
                <div class="pixel-border" style="text-align: center;">
                    <div style="font-size: 14px; margin-bottom: 16px;">通过</div>
                    <div id="stat-passed" style="font-size: 32px; color: var(--pixel-yellow);">0</div>
                </div>
                <div class="pixel-border" style="text-align: center;">
                    <div style="font-size: 14px; margin-bottom: 16px;">通过率</div>
                    <div id="stat-rate" style="font-size: 32px; color: var(--pixel-red);">0%</div>
                </div>
                <div class="pixel-border" style="text-align: center;">
                    <div style="font-size: 14px; margin-bottom: 16px;">题库</div>
                    <div id="stat-questions" style="font-size: 32px; color: var(--pixel-dark);">0</div>
                </div>
            </div>

            <div class="pixel-border" style="margin-bottom: 40px;">
                <h3 style="margin-bottom: 24px;">面试趋势图</h3>
                <div style="margin-bottom: 16px;">
                    <button class="btn-pixel chart-tab is-active" data-chart="line" style="font-size: 12px;">折线图</button>
                    <button class="btn-pixel chart-tab" data-chart="bar" style="font-size: 12px;">柱状图</button>
                </div>
                <canvas id="trend-chart" width="800" height="300" style="width: 100%; height: auto; image-rendering: pixelated;"></canvas>
            </div>

            <div class="pixel-border">
                <h3 style="margin-bottom: 24px;">错题本 (已优化)</h3>
                <button class="btn-pixel btn-pixel--secondary" id="btn-wrong-questions">查看详情</button>
                <div id="wrong-questions-list" style="margin-top: 24px;"></div>
            </div>
        </section>
    </main>

    <!-- 弹窗：新增/编辑面试 -->
    <div class="modal-pixel" id="modal-interview" hidden>
        <div class="modal-content-pixel">
            <h2 id="modal-interview-title" style="margin-top: 0;">NEW RECORD</h2>
            <form id="form-interview">
                <input type="hidden" id="interview-id">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <input type="text" id="interview-company" class="input-pixel" placeholder="公司*" required>
                    <input type="text" id="interview-position" class="input-pixel" placeholder="职位*" required>
                    <select id="interview-round" class="input-pixel">
                        <option value="1">一面</option>
                        <option value="2">二面</option>
                        <option value="3">三面</option>
                        <option value="4">四面</option>
                        <option value="5">HR面</option>
                        <option value="6">终面</option>
                    </select>
                    <input type="datetime-local" id="interview-date" class="input-pixel" required>
                </div>
                <textarea id="interview-transcript" class="input-pixel" rows="4" placeholder="粘贴面试文字稿..." style="margin-bottom: 16px;"></textarea>
                <button type="button" class="btn-pixel btn-pixel--secondary" id="btn-parse-transcript" style="width: 100%; margin-bottom: 16px;">智能解析归纳</button>
                
                <div style="margin-bottom: 24px;">
                    <label style="font-size: 14px; display: block; margin-bottom: 8px;">自我评价 (1-5)</label>
                    <div id="star-rating" style="font-size: 24px; cursor: pointer;">
                        <span class="star-btn" data-star="1">★</span>
                        <span class="star-btn" data-star="2">★</span>
                        <span class="star-btn" data-star="3">★</span>
                        <span class="star-btn" data-star="4">★</span>
                        <span class="star-btn" data-star="5">★</span>
                    </div>
                    <input type="hidden" id="interview-evaluation" value="3">
                </div>

                <div style="display: flex; gap: 16px;">
                    <button type="button" class="btn-pixel btn-pixel--danger" id="btn-cancel-interview" style="flex: 1;">取消</button>
                    <button type="submit" class="btn-pixel btn-pixel--primary" style="flex: 1;">保存数据</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 弹窗：添加/编辑题目 -->
    <div class="modal-pixel" id="modal-question" hidden>
        <div class="modal-content-pixel">
            <h2 id="modal-question-title" style="margin-top: 0;">ADD QUESTION</h2>
            <form id="form-question">
                <input type="hidden" id="question-id">
                <textarea id="question-content" class="input-pixel" rows="3" placeholder="题目内容*" required style="margin-bottom: 16px;"></textarea>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px;">
                    <input type="text" id="question-company" class="input-pixel" placeholder="来源公司">
                    <input type="text" id="question-position" class="input-pixel" placeholder="职位*" required>
                    <input type="text" id="question-category" class="input-pixel" placeholder="类别" list="category-datalist">
                    <datalist id="category-datalist"></datalist>
                    <select id="question-difficulty" class="input-pixel">
                        <option value="easy">简单</option>
                        <option value="medium" selected>中等</option>
                        <option value="hard">困难</option>
                    </select>
                </div>
                <textarea id="question-answer" class="input-pixel" rows="2" placeholder="原始回答" style="margin-bottom: 16px;"></textarea>
                <textarea id="question-optimized-answer" class="input-pixel" rows="3" placeholder="优化后的回答" style="margin-bottom: 24px; border-color: var(--pixel-teal);"></textarea>
                
                <div style="display: flex; gap: 16px;">
                    <button type="button" class="btn-pixel btn-pixel--danger" id="btn-cancel-question" style="flex: 1;">取消</button>
                    <button type="submit" class="btn-pixel btn-pixel--primary" style="flex: 1;">确认添加</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 弹窗：详情查看 -->
    <div class="modal-pixel" id="modal-view" hidden>
        <div class="modal-content-pixel" style="max-width: 800px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 id="modal-view-title" style="margin: 0;">DETAILS</h2>
                <button class="btn-pixel btn-pixel--danger" id="modal-view-close" style="padding: 4px 8px;">X</button>
            </div>
            <div id="view-content" style="max-height: 500px; overflow-y: auto;"></div>
        </div>
    </div>

    <!-- 弹窗：类别管理 -->
    <div class="modal-pixel" id="modal-manage-categories" hidden>
        <div class="modal-content-pixel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
                <h2 style="margin: 0;">CATEGORIES</h2>
                <button class="btn-pixel btn-pixel--danger" id="modal-categories-close" style="padding: 4px 8px;">X</button>
            </div>
            <div style="display: flex; gap: 8px; margin-bottom: 24px;">
                <input type="text" id="new-category-input" class="input-pixel" placeholder="NEW CAT...">
                <button class="btn-pixel btn-pixel--primary" id="btn-add-category-save">ADD</button>
            </div>
            <div id="category-list-manage" style="max-height: 300px; overflow-y: auto;"></div>
            <button class="btn-pixel btn-pixel--primary" id="btn-close-categories" style="width: 100%; margin-top: 24px;">DONE</button>
        </div>
    </div>

    <input type="file" id="file-import" accept=".json" hidden>
    <div id="toast" class="pixel-border" style="position: fixed; bottom: 20px; right: 20px; z-index: 2000; background: var(--pixel-yellow); padding: 12px 24px; font-size: 8px;" hidden></div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
